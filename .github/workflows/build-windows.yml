name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "XiangqiHelper"
  ARTIFACT_NAME: "XiangqiHelper-windows-x64"

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python packages
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Verify bundled runtime files
        shell: pwsh
        run: |
          $required = @(
            "main.py",
            "config.json",
            "assets/boardchess.jpg",
            "templates/ref_board.png",
            "pikafish.nnue"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing required file: $path"
            }
          }
          $engines = Get-ChildItem -LiteralPath . -Filter "pikafish*.exe" -File
          if (-not $engines) {
            throw "Missing required engine files: pikafish*.exe"
          }
          $engines | Select-Object Name, Length

      - name: Build app with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onedir `
            --windowed `
            --name $env:APP_NAME `
            --add-data "config.json;." `
            --add-data "assets;assets" `
            --add-data "templates;templates" `
            --add-data "pikafish.nnue;." `
            main.py

      - name: Copy CPU-specific Pikafish engines
        shell: pwsh
        run: |
          $appDir = "dist/$env:APP_NAME"
          Get-ChildItem -LiteralPath . -Filter "pikafish*.exe" -File |
            Copy-Item -Destination $appDir -Force

      - name: Copy optional opening book
        shell: pwsh
        run: |
          $appDir = "dist/$env:APP_NAME"
          if (Test-Path -LiteralPath "book.xqb") {
            Copy-Item -LiteralPath "book.xqb" -Destination $appDir -Force
            Write-Host "Included book.xqb"
          } else {
            Write-Host "book.xqb not found in repository; package will run without bundled opening book."
          }

      - name: Add user notes
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "README.md" -Destination "dist/$env:APP_NAME/README.md" -Force
          New-Item -ItemType Directory -Force -Path "dist/$env:APP_NAME/records" | Out-Null
          @"
          双击 XiangqiHelper.exe 启动象棋助手。

          第一次使用请打开：连线 -> 设置 -> 校准棋盘。
          如果需要开局库，把 book.xqb 放到本文件夹即可。
          "@ | Set-Content -Path "dist/$env:APP_NAME/使用说明.txt" -Encoding UTF8

      - name: Smoke test executable exists
        shell: pwsh
        run: |
          $exe = "dist/$env:APP_NAME/$env:APP_NAME.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Build failed: $exe was not created"
          }
          Get-ChildItem -LiteralPath "dist/$env:APP_NAME" | Select-Object Name, Length

      - name: Create zip package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Compress-Archive `
            -Path "dist/$env:APP_NAME/*" `
            -DestinationPath "package/$env:ARTIFACT_NAME.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: package/${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Upload package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: package/${{ env.ARTIFACT_NAME }}.zip
